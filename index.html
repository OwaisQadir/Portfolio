<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owais Qadir | Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
}

/* NAVBAR */
nav {
  position: fixed;
  width: 100%;
  background: #020617;
  padding: 15px;
  text-align: center;
  top: 0;
  z-index: 1000;
}

nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
}

nav a.active {
  color: #38bdf8;
  border-bottom: 2px solid #38bdf8;
}

/* SECTIONS */
section {
  padding: 100px 20px;
  max-width: 1000px;
  margin: auto;
  opacity: 0;
  transform: translateY(40px);
  transition: 0.6s;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

#home {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
}

h1 { font-size: 3rem; }

/* PROJECTS */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  border-radius: 8px;
}

/* FORM */
input, textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 5px;
}

button {
  padding: 10px 20px;
  background: #38bdf8;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
</nav>

<!-- HOME -->
<section id="home" class="show">
  <h1>Owais Qadir</h1>
  <p id="typing"></p>
</section>

<!-- ABOUT -->
<section id="about">
  <h2>About Me</h2>
  <p>I turn data into insights using dashboards, analytics, and scraping.</p>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>Projects</h2>

  <div class="projects">

    <div class="card">
      <img src="https://via.placeholder.com/400x200">
      <h3>E-commerce Dashboard</h3>
      <p>Sales & revenue insights</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/400x200">
      <h3>Web Scraper</h3>
      <p>31,000 listings extracted</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/400x200">
      <h3>Real Estate Analysis</h3>
      <p>Investment insights</p>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact Me</h2>

  <form onsubmit="sendMessage(event)">
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea placeholder="Your Message" required></textarea>
    <button type="submit">Send</button>
  </form>

  <p id="status"></p>
</section>

<script>

/* TYPING EFFECT */
const text = ["Data Analyst", "Dashboard Expert", "Web Scraper"];
let i = 0, j = 0, current = "", isDeleting = false;

function type() {
  current = text[i];
  document.getElementById("typing").textContent = current.substring(0, j);

  if (!isDeleting && j < current.length) j++;
  else if (isDeleting && j > 0) j--;
  else {
    isDeleting = !isDeleting;
    if (!isDeleting) i = (i + 1) % text.length;
  }

  setTimeout(type, isDeleting ? 50 : 100);
}

type();

/* SCROLL ANIMATION */
const sections = document.querySelectorAll("section");

window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    const top = window.scrollY;
    const offset = sec.offsetTop - 200;
    const height = sec.offsetHeight;

    if (top >= offset && top < offset + height) {
      sec.classList.add("show");
    }
  });
});

/* ACTIVE NAV */
const navLinks = document.querySelectorAll("nav a");

window.addEventListener("scroll", () => {
  let fromTop = window.scrollY;

  navLinks.forEach(link => {
    let section = document.querySelector(link.getAttribute("href"));

    if (
      section.offsetTop <= fromTop + 100 &&
      section.offsetTop + section.offsetHeight > fromTop + 100
    ) {
      link.classList.add("active");
    } else {
      link.classList.remove("active");
    }
  });
});

/* FAKE FORM SUBMIT */
function sendMessage(e) {
  e.preventDefault();
  document.getElementById("status").textContent =
    "Message sent successfully! (Demo only)";
}

</script>

</body>
</html>
