<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owais Qadir | Data Analyst</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(180deg, #020617, #0f172a);
  color: #fff;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  background: rgba(2,6,23,0.7);
  backdrop-filter: blur(10px);
  padding: 15px;
  text-align: center;
  z-index: 1000;
}

nav a {
  margin: 0 15px;
  text-decoration: none;
  color: #94a3b8;
}

nav a.active,
nav a:hover {
  color: #38bdf8;
}

/* HERO */
#home {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
}

h1 {
  font-size: 3rem;
}

.highlight {
  color: #38bdf8;
}

.btn {
  margin-top: 20px;
  padding: 10px 20px;
  background: #38bdf8;
  color: black;
  border-radius: 5px;
  text-decoration: none;
}

/* SECTIONS */
section {
  padding: 100px 20px;
  max-width: 1100px;
  margin: auto;
  opacity: 0;
  transform: translateY(40px);
  transition: 0.6s;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

h2 {
  text-align: center;
  margin-bottom: 30px;
}

/* SKILLS */
.skills {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
}

.skill {
  background: rgba(30,41,59,0.6);
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  transition: 0.3s;
}

.skill:hover {
  border: 1px solid #38bdf8;
}

/* PROJECTS */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.project {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
}

.project img {
  width: 100%;
  display: block;
}

.project:hover img {
  transform: scale(1.1);
}

.project-info {
  position: absolute;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  width: 100%;
  padding: 10px;
}

/* CONTACT */
.contact {
  text-align: center;
}

a { color: #38bdf8; }

</style>
</head>

<body>

<nav>
  <a href="#home">Home</a>
  <a href="#skills">Skills</a>
  <a href="#projects">Projects</a>
  <a href="#contact">Contact</a>
</nav>

<section id="home" class="show">
  <h1>Hi, I'm <span class="highlight">Owais Qadir</span></h1>
  <p id="typing"></p>
  <p>Turning Raw Data into Clear Reports and Insights</p>
  <a href="#projects" class="btn">View Projects</a>
</section>

<section id="skills">
  <h2>Skills</h2>
  <div class="skills">
    <div class="skill">Python</div>
    <div class="skill">SQL</div>
    <div class="skill">Power BI</div>
    <div class="skill">Tableau</div>
    <div class="skill">Excel</div>
    <div class="skill">Web Scraping</div>
  </div>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div class="projects">

    <div class="project">
      <img src="https://via.placeholder.com/400x250">
      <div class="project-info">E-commerce Dashboard</div>
    </div>

    <div class="project">
      <img src="https://via.placeholder.com/400x250">
      <div class="project-info">Web Scraper</div>
    </div>

    <div class="project">
      <img src="https://via.placeholder.com/400x250">
      <div class="project-info">Real Estate Analysis</div>
    </div>

  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <div class="contact">
    <p>Email: owaisqadir84@gmail.com</p>
    <p><a href="https://www.linkedin.com/in/owais-qadir/">LinkedIn</a></p>
    <p><a href="https://www.upwork.com/freelancers/owaisqadir">Upwork</a></p>
  </div>
</section>

<script>
const text=["Data Analyst","Dashboard Expert","Web Scraper"];
let i=0,j=0,current="",isDeleting=false;

function type(){
  current=text[i];
  document.getElementById("typing").textContent=current.substring(0,j);

  if(!isDeleting && j<current.length) j++;
  else if(isDeleting && j>0) j--;
  else{
    isDeleting=!isDeleting;
    if(!isDeleting) i=(i+1)%text.length;
  }
  setTimeout(type,isDeleting?50:100);
}
type();

/* scroll animation */
const sections=document.querySelectorAll("section");
window.addEventListener("scroll",()=>{
  sections.forEach(sec=>{
    const offset=sec.offsetTop-200;
    if(window.scrollY>=offset){
      sec.classList.add("show");
    }
  });
});
</script>

</body>
</html>
